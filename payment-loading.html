<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta
            name="viewport"
            content="width=device-width, initial-scale=1, viewport-fit=cover"
    >
    <meta name="color-scheme" content="dark">
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <title>결제 페이지 연결 중</title>

    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            min-height: 100%;
            margin: 0;
        }

        body {
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding:
                    max(24px, env(safe-area-inset-top))
                    max(24px, env(safe-area-inset-right))
                    max(24px, env(safe-area-inset-bottom))
                    max(24px, env(safe-area-inset-left));
            background: #030506;
            color: #f7f7f7;
            font-family:
                    -apple-system,
                    BlinkMacSystemFont,
                    "Pretendard",
                    "Apple SD Gothic Neo",
                    Arial,
                    sans-serif;
            text-align: center;
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
        }

        .payment-loading {
            width: 100%;
            max-width: 420px;
            padding: 40px 24px;
        }

        .payment-spinner {
            width: 52px;
            height: 52px;
            margin: 0 auto 28px;
            border: 5px solid rgba(18, 184, 213, 0.22);
            border-top-color: #12b8d5;
            border-radius: 50%;
            animation: payment-spin 0.8s linear infinite;
        }

        h1 {
            margin: 0 0 14px;
            font-size: 26px;
            line-height: 1.4;
            letter-spacing: -0.03em;
            word-break: keep-all;
        }

        p {
            margin: 0;
            color: #98a7b2;
            font-size: 17px;
            line-height: 1.6;
        }

        @keyframes payment-spin {
            to {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 24px;
            }

            p {
                font-size: 16px;
            }
        }
    </style>
</head>

<body>
<main class="payment-loading">
    <div class="payment-spinner" aria-hidden="true"></div>
    <h1>결제 페이지를 준비하고 있습니다.</h1>
    <p>잠시만 기다려 주세요.</p>
</main>
</body>
</html>
